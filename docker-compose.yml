version: "3.8"

services:
  user-service:
    build: ./backend/user_service
    container_name: user-service
    ports:
      - "3000:8000"
    env_file:
      - .env
  admin-seed:
    build: ./backend/user_service
    container_name: admin-seed
    restart: "no"
    env_file:
      - .env
    depends_on:
      - user-service
    command: python database/init_db.py

  question-service:
    build: ./backend/question_service
    container_name: question-service
    ports:
      - "3001:8000"
    env_file:
      - .env
    depends_on:
      - user-service
    environment:
      # This overrides the local URL so they can talk inside Docker
      - USER_SERVICE_VERIFY_ADMIN_URL=http://user-service:8000/auth/verify-admin
      - USER_SERVICE_VERIFY_TOKEN_URL=http://user-service:8000/auth/verify-token

  collaboration-service:
    build: ./backend/collaboration_service
    container_name: collaboration-service
    ports:
      - "3003:8000"
    env_file:
      - .env
    depends_on:
      - redis

  matching-service:
    build: ./backend/matching_service
    container_name: matching-service
    ports:
      - "3002:8000"
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - QUESTION_SERVICE_URL=http://question-service:8000
      - USER_SERVICE_URL=http://user-service:8000
      - COLLAB_SERVICE_URL=http://collaboration-service:8000

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    privileged: true
    ports:
      - "2000:2000"
    restart: unless-stopped
    tmpfs:
      - /piston/jobs

  piston-init:
    image: curlimages/curl:latest
    container_name: piston-init
    depends_on:
      - piston
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Piston...' &&
        until curl -sf http://piston:2000/api/v2/runtimes; do sleep 3; done &&
        echo 'Piston ready. Installing packages...' &&
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"python\",\"version\":\"3.10.0\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"node\",\"version\":\"18.15.0\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"typescript\",\"version\":\"5.0.3\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"java\",\"version\":\"15.0.2\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"gcc\",\"version\":\"10.2.0\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"mono\",\"version\":\"6.12.0\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"go\",\"version\":\"1.16.2\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"rust\",\"version\":\"1.50.0\"}' ;
        curl -sf -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"ruby\",\"version\":\"3.0.1\"}' ;
        echo 'All packages installed.'
      "